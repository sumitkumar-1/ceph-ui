apiVersion: v1
kind: Namespace
metadata:
  name: ceph-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceph-ui
  namespace: ceph-ui
  labels:
    app: ceph-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ceph-ui
  template:
    metadata:
      labels:
        app: ceph-ui
    spec:
      containers:
        - name: ceph-ui
          image: your-registry.example.com/platform/ceph-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ceph-ui
  namespace: ceph-ui
  labels:
    app: ceph-ui
spec:
  selector:
    app: ceph-ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ceph-ui
  namespace: ceph-ui
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ceph-ui.example.corp
      secretName: ceph-ui-tls
  rules:
    - host: ceph-ui.example.corp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ceph-ui
                port:
                  number: 80
